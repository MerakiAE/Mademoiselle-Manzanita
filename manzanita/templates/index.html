<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mademoiselle Manzanita</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple:    #7F77DD;
    --purple-l:  #EEEDFE;
    --purple-d:  #534AB7;
    --bg:        #2C2C2A;
    --bg2:       #3A3A37;
    --bg3:       #444441;
    --text:      #F1EFE8;
    --muted:     #B4B2A9;
    --radius:    18px;
  }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh;
    max-width: 480px; margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  header {
    background: var(--purple);
    padding: 14px 18px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px #0004;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--purple-l);
    display: grid; place-items: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info h1 { font-size: 15px; font-weight: 700; color: var(--purple-l); }
  .header-info p  { font-size: 11px; color: #d8d6f5; margin-top: 1px; }

  /* ── Gallery toggle ── */
  .gallery-btn {
    margin-left: auto;
    background: var(--purple-d);
    border: none; border-radius: 10px;
    color: var(--purple-l); font-size: 18px;
    width: 36px; height: 36px;
    display: grid; place-items: center;
    cursor: pointer; flex-shrink: 0;
    transition: background .15s;
  }
  .gallery-btn:active { background: #3d3490; }

  /* ── Chat area ── */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  /* ── Bubbles ── */
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--purple);
    color: var(--purple-l);
    border-bottom-right-radius: 5px;
  }
  .msg.bot .bubble {
    background: var(--bg2);
    color: var(--muted);
    border-bottom-left-radius: 5px;
  }

  /* imagen en burbuja */
  .bubble img {
    max-width: 100%; border-radius: 10px;
    display: block; margin-top: 6px;
  }

  .ts {
    font-size: 10px; color: #6b6a65;
    margin: 2px 4px 0;
  }

  /* ── Input bar ── */
  #inputbar {
    background: var(--bg2);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
    border-top: 1px solid var(--bg3);
  }

  /* attach button */
  .attach-btn {
    background: none; border: none;
    color: var(--muted); font-size: 22px;
    cursor: pointer; padding: 4px; flex-shrink: 0;
    transition: color .15s;
  }
  .attach-btn:active { color: var(--purple); }
  #file-input { display: none; }

  #msg-input {
    flex: 1;
    background: var(--bg3);
    border: none; outline: none;
    border-radius: 22px;
    padding: 10px 16px;
    font-family: inherit; font-size: 14px;
    color: var(--text); caret-color: var(--purple);
    resize: none; max-height: 100px; overflow-y: auto;
  }
  #msg-input::placeholder { color: #7a7975; }

  #send-btn {
    background: var(--purple);
    border: none; border-radius: 50%;
    width: 40px; height: 40px; flex-shrink: 0;
    display: grid; place-items: center;
    cursor: pointer; transition: background .15s;
  }
  #send-btn:active { background: var(--purple-d); }
  #send-btn svg { width: 18px; height: 18px; fill: var(--purple-l); }

  /* ── Gallery overlay ── */
  #gallery {
    position: absolute; inset: 0;
    background: var(--bg);
    display: none; flex-direction: column;
    z-index: 10;
  }
  #gallery.open { display: flex; }

  .gallery-header {
    background: var(--purple);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .gallery-header h2 { font-size: 15px; font-weight: 700; color: var(--purple-l); flex: 1; }
  .close-btn {
    background: none; border: none;
    color: var(--purple-l); font-size: 22px;
    cursor: pointer; line-height: 1;
  }

  #gallery-grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 3px; padding: 3px;
    align-content: start;
  }
  .gallery-thumb {
    aspect-ratio: 1; overflow: hidden;
    background: var(--bg2);
    cursor: pointer;
  }
  .gallery-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: opacity .15s;
  }
  .gallery-thumb:active img { opacity: .7; }

  .gallery-empty {
    grid-column: 1/-1;
    text-align: center; color: var(--muted);
    padding: 40px 20px; font-size: 14px;
  }

  /* ── Typing indicator ── */
  .typing .bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    animation: bounce .9s infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .4; }
    40%          { transform: translateY(-6px); opacity: 1; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="avatar">🌸</div>
    <div class="header-info">
      <h1>Mademoiselle Manzanita</h1>
      <p>Sardónica • Disponible</p>
    </div>
    <button class="gallery-btn" onclick="openGallery()" title="Galería">🖼️</button>
  </header>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input -->
  <div id="inputbar">
    <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Enviar imagen">📎</button>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
    <textarea id="msg-input" rows="1" placeholder="Escribe algo..." oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- Gallery overlay -->
  <div id="gallery">
    <div class="gallery-header">
      <h2>Imágenes enviadas</h2>
      <button class="close-btn" onclick="closeGallery()">✕</button>
    </div>
    <div id="gallery-grid"></div>
  </div>

</div>

<script>
  const SID = "u_" + Math.random().toString(36).slice(2);
  const chatEl = document.getElementById("chat");
  const input  = document.getElementById("msg-input");

  // ── Utilidades ────────────────────────────────────────────────────────
  function now() {
    return new Date().toLocaleTimeString("es-MX", {hour:"2-digit", minute:"2-digit"});
  }

  function scrollBottom() {
    chatEl.scrollTo({top: chatEl.scrollHeight, behavior: "smooth"});
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  // ── Añadir mensajes ───────────────────────────────────────────────────
  function addMsg(who, content, isHtml = false) {
    const wrap   = document.createElement("div");
    wrap.className = `msg ${who}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (isHtml) bubble.innerHTML = content;
    else        bubble.textContent = content;

    const ts = document.createElement("span");
    ts.className = "ts";
    ts.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    chatEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg bot typing";
    wrap.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    chatEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  // ── Enviar texto ──────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ""; input.style.height = "auto";

    addMsg("user", text);
    const typing = addTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sid: SID, message: text})
      });
      const data = await res.json();
      typing.remove();
      addMsg("bot", data.response);
      if (data.bye) setTimeout(() => location.reload(), 1800);
    } catch {
      typing.remove();
      addMsg("bot", "Error de conexión");
    }
  }

  // ── Enviar imagen ─────────────────────────────────────────────────────
  async function handleFile(input_el) {
    const file = input_el.files[0];
    if (!file) return;
    input_el.value = "";

    // Preview local inmediato
    const reader = new FileReader();
    reader.onload = async e => {
      addMsg("user", `<img src="${e.target.result}" alt="${file.name}">`, true);

      const typing = addTyping();
      const form   = new FormData();
      form.append("image", file);

      try {
        const res  = await fetch("/upload", {method: "POST", body: form});
        const data = await res.json();
        typing.remove();
        if (data.ok) addMsg("bot", "Imagen guardada en la galería 🌸");
        else         addMsg("bot", "No pude guardar la imagen");
      } catch {
        typing.remove();
        addMsg("bot", "Error al subir la imagen");
      }
    };
    reader.readAsDataURL(file);
  }

  // ── Galería ───────────────────────────────────────────────────────────
  async function openGallery() {
    document.getElementById("gallery").classList.add("open");
    const grid = document.getElementById("gallery-grid");
    grid.innerHTML = "";

    try {
      const res   = await fetch("/images");
      const imgs  = await res.json();
      if (!imgs.length) {
        grid.innerHTML = `<p class="gallery-empty">Aún no hay imágenes</p>`;
        return;
      }
      imgs.forEach(img => {
        const div = document.createElement("div");
        div.className = "gallery-thumb";
        div.innerHTML = `<img src="${img.src}" alt="${img.name}" loading="lazy">`;
        div.onclick = () => window.open(img.src, "_blank");
        grid.appendChild(div);
      });
    } catch {
      grid.innerHTML = `<p class="gallery-empty">Error al cargar imágenes</p>`;
    }
  }

  function closeGallery() {
    document.getElementById("gallery").classList.remove("open");
  }

  // ── Enter para enviar (Shift+Enter = salto de línea) ─────────────────
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Mensaje de bienvenida ─────────────────────────────────────────────
  window.addEventListener("load", () => {
    setTimeout(() => addMsg("bot", "Hola... supongo. ¿En qué puedo ayudarte?"), 400);
  });
</script>
</body>
</html>
